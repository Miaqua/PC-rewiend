<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | TechService</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-100: #f3e8ff;
            --primary-200: #d8b4fe;
            --primary-300: #c084fc;
            --primary-400: #a855f7;
            --primary-500: #8b5cf6;
            --primary-600: #7c3aed;
            --primary-700: #6d28d9;
            --primary-800: #5b21b6;
            --primary-900: #4c1d95;
            
            --gradient-from: #8b5cf6;
            --gradient-to: #c084fc;
            
            --dark-bg: #1e1b2e;
            --dark-card: #2a2540;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .dark-mode {
            background-color: var(--dark-bg);
            color: #e0e0e0;
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--gradient-from) 0%, var(--gradient-to) 100%);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--gradient-from) 0%, var(--gradient-to) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-container {
            max-width: 500px;
            width: 100%;
            margin: auto;
        }

        .auth-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
        }

        .dark-mode .auth-card {
            background-color: var(--dark-card);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary-700) 0%, var(--primary-500) 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-from) 0%, var(--gradient-to) 100%);
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
        }

        .dark-mode .form-control {
            background-color: #2a2a4a;
            border-color: #3a3a5a;
            color: #fff;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #6c757d;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .dark-mode .divider {
            color: #b0b0b0;
        }

        .dark-mode .divider::before, 
        .dark-mode .divider::after {
            border-bottom-color: #3a3a5a;
        }

        .theme-switcher {
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .theme-switcher:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <nav class="navbar navbar-expand-lg navbar-dark gradient-bg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-laptop-code me-2"></i>TechService
            </a>
            <div class="d-flex align-items-center">
                <span class="theme-switcher text-white me-3" id="themeSwitcher">
                    <i class="fas fa-moon me-1"></i>Темная тема
                </span>
                <a href="register.html" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-user-plus me-1"></i>Регистрация
                </a>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h3><i class="fas fa-sign-in-alt me-2"></i>Вход в аккаунт</h3>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Ваш email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" placeholder="Ваш пароль" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Запомнить меня</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>
                            <div class="text-center mb-3">
                                <a href="#" class="text-decoration-none">Забыли пароль?</a>
                            </div>
                            <div class="divider">или</div>
                            <div class="text-center">
                                <p class="mb-0">Еще нет аккаунта? <a href="register.html" class="fw-bold gradient-text">Зарегистрируйтесь</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="py-4 text-center" style="background-color: var(--primary-900); color: white;">
        <div class="container">
            <p class="mb-0">&copy; 2023 TechService. Все права защищены.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Переключение темы
        document.addEventListener('DOMContentLoaded', function() {
            const themeSwitcher = document.getElementById('themeSwitcher');
            const html = document.documentElement;
            
            // Проверяем сохраненную тему
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-bs-theme', savedTheme);
            
            if (savedTheme === 'dark') {
                themeSwitcher.innerHTML = '<i class="fas fa-sun me-1"></i>Светлая тема';
                document.body.classList.add('dark-mode');
            }
            
            // Обработчик переключения
            themeSwitcher.addEventListener('click', function() {
                const currentTheme = html.getAttribute('data-bs-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                
                html.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                
                if (newTheme === 'dark') {
                    this.innerHTML = '<i class="fas fa-sun me-1"></i>Светлая тема';
                    document.body.classList.add('dark-mode');
                } else {
                    this.innerHTML = '<i class="fas fa-moon me-1"></i>Темная тема';
                    document.body.classList.remove('dark-mode');
                }
            });
        });
    </script>
</body>
</html>
